[toolchain]
anchor_version = "0.31.0"
# Pin the Agave/SBF toolchain so `anchor build` uses platform-tools with Rust
# >= 1.85 (needed for edition-2024 crates pulled into Cargo.lock). Verified
# building + testing with Agave 4.0.2 / platform-tools v1.53.
solana_version = "4.0.2"

[features]
resolution = true
skip-lint = false

[programs.localnet]
bracket_bond = "EbYmsXdALmF4GHY5JQT2Rv5fqC2Nws2qFcnh4B1QXE3U"

[programs.devnet]
bracket_bond = "EbYmsXdALmF4GHY5JQT2Rv5fqC2Nws2qFcnh4B1QXE3U"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "pnpm exec ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
